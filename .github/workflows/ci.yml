name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'

      - name: Lint
        run: ruff check

      - name: Tests
        run: pytest

      - name: Golden retrieval evaluation
        env:
          MUNIBOT_ENABLE_SEMANTIC_RAG: "false"
        run: python scripts/evaluate_golden_set.py
